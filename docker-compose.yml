services:
  webhook:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      APPS_DIR: ${APPS_DIR}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}   # vide = dépôts publics seulement
      PATHS_CONFIG: /config/paths.json  # chemin fixe dans le conteneur
    volumes:
      - ${PONTIS_ROOT}:${PONTIS_ROOT}
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PATHS_CONFIG_FILE:-/dev/null}:/config/paths.json:ro
      - ${DOCKER_CONFIG_DIR:-/root/.docker}:/root/.docker:ro
    networks:
      - pontis_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.webhook.rule=Host(`hooks.pontis.ongoua.pro`)"
      - "traefik.http.routers.webhook.entrypoints=websecure"
      - "traefik.http.routers.webhook.tls=true"
      - "traefik.http.routers.webhook.tls.certresolver=letsencrypt"
      - "traefik.http.services.webhook.loadbalancer.server.port=9000"

networks:
  pontis_network:
    external: true
